services:
  eyedownload:
    build: .
    image: eyedownload:latest
    container_name: eyedownload
    restart: unless-stopped
    ports:
      - "${PORT:-7842}:7842"
    environment:
      PORT: 7842
      YOUTUBE_DL_SKIP_PYTHON_CHECK: "1"
      YOUTUBE_DL_FILENAME: yt-dlp_linux
      NODE_ENV: production
    volumes:
      - eyedownload_downloads:/app/downloads

volumes:
  eyedownload_downloads:
